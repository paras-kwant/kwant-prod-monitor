name: Kwant Monitor

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Run monitor
        env:
          APP_EMAIL: ${{ secrets.APP_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          APP_PROJECT_ID: ${{ secrets.APP_PROJECT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node kwant-monitor.js

      - name: Keep repo active
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "Last run: $(date -u)" > last_run.txt
          git add last_run.txt
          git diff --staged --quiet || git commit -m "chore: monitor heartbeat $(date -u +'%Y-%m-%d %H:%M')"
          git push